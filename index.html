<!doctype html>
<html lang="ar" dir="auto">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <script>
      // Dynamically add or remove manifest link so only Dashboard and Sales expose installable manifests
      (function(){
        try{
          var p = location.pathname || '/';
          var existing = document.querySelector('link[rel="manifest"]');
          if(p.indexOf('/dashboard') === 0){
            if(!existing){ existing = document.createElement('link'); existing.rel = 'manifest'; document.head.appendChild(existing); }
            existing.href = '/dashboard/manifest.webmanifest';
          } else if(p.indexOf('/sales') === 0){
            if(!existing){ existing = document.createElement('link'); existing.rel = 'manifest'; document.head.appendChild(existing); }
            existing.href = '/sales/manifest.webmanifest';
          } else {
            // add root manifest for client-facing site
            if(!existing){ existing = document.createElement('link'); existing.rel = 'manifest'; document.head.appendChild(existing); }
            existing.href = '/manifest.webmanifest';
          }
        }catch(e){ console.error(e); }
      })();
    </script>
    <meta name="theme-color" content="#ffffff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Marym Atelier — Bridal Counture, Rental Luxury Dresses" />
    <meta property="og:site_name" content="Marym Atelier" />
    <meta property="og:locale" content="ar_EG" />
    <title>Marym Atelier — Wedding Dresses</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Service worker registration removed intentionally (PWA features disabled) -->
    <script>
      // Unregister any existing service workers and clear caches to avoid SW intercepts
      (async function(){
        if ('serviceWorker' in navigator) {
          try {
            const regs = await navigator.serviceWorker.getRegistrations();
            for (const r of regs) {
              try { await r.unregister(); } catch (e) { /* ignore individual failures */ }
            }
            // also attempt to unregister the active registration
            try { const reg = await navigator.serviceWorker.getRegistration(); if (reg) await reg.unregister(); } catch (e){}
            console.log('Service workers unregistered');
          } catch (e) { console.error('Error while unregistering service workers', e); }
        }

        if (window.caches && caches.keys) {
          try {
            const keys = await caches.keys();
            for (const k of keys) {
              try { await caches.delete(k); } catch (e) { /* ignore */ }
            }
            console.log('Caches cleared');
          } catch (e) { console.error('Error while clearing caches', e); }
        }
      })();
    </script>
    <script src="/env.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
